# ModelScope 免费模型配置示例
# 使用网页爬虫从 modelscope.cn 获取热门免费模型列表
modelscope:
  baseUrl: "https://api-inference.modelscope.cn/v1"
  apiKey: "${MODELSCOPE_API_KEY}"
  plugin:
    code: "plugin.modelscope"
    cache_timeout: 3600 # 缓存过期时间（秒），默认1小时
    args:
      # 爬虫配置（必填）
      scrape_url: "https://www.modelscope.cn/models?filter=inference_type&page=1&sort=default&tabKey=task" # 爬虫URL（必填）
      max_models: 50 # 获取的最大模型数量
      scraper_timeout: 60 # 爬虫超时时间（秒）
      headless: true # 无头模式运行浏览器

      # 定时任务配置
      enable_scheduled_task: true # 是否启用定时任务
      schedule_cron: "0 2 * * *" # cron表达式，每天凌晨2点执行
  models: [] # 静态配置的模型（可选，会追加到爬虫获取的模型后面）
  timeout: 30
  weight: 10 # 权重较高，优先使用
  enabled: true
  quota_period: "daily" # 每日额度刷新

